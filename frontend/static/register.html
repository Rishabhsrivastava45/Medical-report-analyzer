<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MedAnalyzer Pro</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #eff6ff 0%, #dce7ff 100%);
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .auth-container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 700;
        }
        .subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: var(--primary-color);
        }
        .primary-btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            border-radius: 8px;
            background: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .primary-btn:hover {
            opacity: 0.9;
        }
        .auth-links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .auth-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        .error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
        /* Dark Theme Support */
        body[data-theme="dark"] {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-main);
        }
        body[data-theme="dark"] .auth-container {
            background: var(--card-bg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        body[data-theme="dark"] .input-group input {
            background: var(--bg-color);
            color: var(--text-main);
            border-color: var(--border-color);
        }
        /* Password Toggle Styles */
        .password-toggle-container {
            position: relative;
            width: 100%;
        }
        .password-toggle-container input {
            padding-right: 3rem !important;
        }
        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .password-toggle:hover {
            color: #2563eb;
        }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>
    <div class="auth-container">
        <div class="logo">
            <i class="fas fa-heart-pulse"></i>
            <span>MedAnalyzer Pro</span>
        </div>
        <p class="subtitle">Create an account to securely store reports.</p>
        
        <div class="error-msg" id="error-msg"></div>

        <form id="register-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="password-toggle-container">
                    <input type="password" id="password" required placeholder="••••••••">
                    <button type="button" class="password-toggle" id="toggle-password" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <small style="color: var(--text-muted); font-size: 0.75rem; display: block; margin-top: 0.25rem;">Must be 8-20 chars, with 1 uppercase letter &amp; 1 number.</small>
            </div>
            <button type="submit" class="primary-btn" id="submit-btn">Create Account</button>
        </form>

        <div class="auth-links">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>

    <script>
        // Password Visibility Toggle
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('submit-btn');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user_name', data.name);
                    window.location.href = '/';
                } else {
                    errorMsg.style.color = 'var(--danger)';
                    errorMsg.textContent = data.detail || 'Registration failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.style.color = 'var(--danger)';
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
            } finally {
                btn.innerHTML = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
